<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://contextmate-fb.onrender.com/contextmate-lib-btn.js.css" />
    <script src="https://contextmate-fb.onrender.com/contextmate-lib-btn.js.umd.js"></script>
  </head>
  <body>
    <iframe
      id="myFrame"
      src="http://localhost:5000/live_chat/dark/891fe32f-b695-409f-8f15-d046dd643659"
      width="100%"
      height="100%"
      style="border: 0px">
    </iframe>
    <script>
      const iframe = document.getElementById("myFrame");
      const secureToken = "891fe32f-b695-409f-8f15-d046dd643659";
      iframe.onload = () => {
        iframe.contentWindow.postMessage(
          {
            type: "AUTH_TOKEN",
            token: secureToken,
            host: window.location.origin,
          },
          "http://localhost:5000",
        );
      };

      
    </script>
  </body>
</html>
