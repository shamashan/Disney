  <body>

      width="100%"
      height="100%"
      style="border: 0px">

      const iframe = document.getElementById("myFrame");
      const secureToken = "16b4cb55-e1dd-4938-947b-25136b946e38";
      iframe.onload = () => {
        iframe.contentWindow.postMessage(
